      <path d="M-260 164h230" />
      <path d="M270 164h230" />
      <path d="M-236 164l9-24 9 48 9-72 9 96 9-72 9 48 9-24" />
      <path d="M468 140l9 24 9-48 9 72 9-96 9 72 9-48 9 24" />
